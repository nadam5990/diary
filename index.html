<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감정 기록 일기</title>
    <link
        rel="stylesheet"
        as="style"
        crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css"
    />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">오늘은 어떤 하루였나요?</h1>
            <p class="subtitle">감정을 천천히 남기고, AI의 따뜻한 답변을 받아보세요.</p>
        </header>

        <main>
            <section class="auth-section" id="auth-section">
                <div class="auth-card">
                    <div class="auth-header">
                        <p class="auth-eyebrow">Private Journal</p>
                        <h2 id="auth-title">로그인하고 기록을 이어가세요</h2>
                        <p id="auth-description">같은 계정으로 로그인하면 내 감정 기록과 AI 응답을 계속 볼 수 있어요.</p>
                    </div>

                    <div class="auth-tabs">
                        <button id="tab-login" class="auth-tab active" type="button">로그인</button>
                        <button id="tab-register" class="auth-tab" type="button">회원가입</button>
                    </div>

                    <form id="auth-form" class="auth-form">
                        <label class="auth-label hidden" id="field-name">
                            닉네임
                            <input id="auth-name" class="auth-input" type="text" placeholder="표시될 이름을 입력해 주세요" maxlength="30">
                        </label>

                        <label class="auth-label">
                            이메일
                            <input id="auth-email" class="auth-input" type="email" placeholder="name@example.com" autocomplete="email" required>
                        </label>

                        <label class="auth-label">
                            비밀번호
                            <input id="auth-password" class="auth-input" type="password" placeholder="6자 이상 입력해 주세요" autocomplete="current-password" required>
                        </label>

                        <button id="auth-submit" class="btn primary auth-submit" type="submit">로그인</button>

                        <div class="oauth-divider" aria-hidden="true">
                            <span>또는</span>
                        </div>

                        <button id="btn-google-login" class="btn oauth-google" type="button">
                            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                                <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.2-.9 2.3-1.9 3l3 2.3c1.8-1.7 2.9-4.1 2.9-7 0-.7-.1-1.5-.2-2.2H12z"/>
                                <path fill="#34A853" d="M12 21c2.6 0 4.8-.9 6.4-2.4l-3-2.3c-.8.6-1.9 1-3.4 1-2.6 0-4.9-1.8-5.7-4.2l-3.1 2.4C5 18.7 8.2 21 12 21z"/>
                                <path fill="#4A90E2" d="M6.3 13.1c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2L3.2 6.7C2.4 8.2 2 9.6 2 11.1s.4 2.9 1.2 4.4l3.1-2.4z"/>
                                <path fill="#FBBC05" d="M12 4.9c1.4 0 2.6.5 3.6 1.4l2.7-2.7C16.8 2.1 14.6 1.2 12 1.2 8.2 1.2 5 3.5 3.2 6.7l3.1 2.4C7.1 6.7 9.4 4.9 12 4.9z"/>
                            </svg>
                            구글 이메일로 로그인하기
                        </button>

                        <p id="auth-feedback" class="auth-feedback" aria-live="polite"></p>
                    </form>
                </div>
            </section>

            <section class="app-shell hidden" id="app-shell">
                <div class="user-bar">
                    <div>
                        <p class="user-label">현재 로그인</p>
                        <strong id="user-name">사용자</strong>
                        <p id="user-email" class="user-email">user@example.com</p>
                    </div>
                    <button id="btn-logout" class="btn secondary outline-btn" type="button">로그아웃</button>
                </div>

                <div class="input-section">
                    <div class="diary-controls" style="justify-content: flex-end;">
                        <button id="btn-new-diary" class="btn secondary outline-btn" type="button">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            새 일기 쓰기
                        </button>
                    </div>

                    <textarea id="diary-input" placeholder="오늘의 감정과 있었던 일을 편하게 적어보세요."></textarea>

                    <div class="button-group">
                        <button id="btn-voice" class="btn secondary" type="button">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                            음성으로 입력하기
                        </button>
                        <button id="btn-analyze" class="btn primary" type="button">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                            </svg>
                            분석 요청하기
                        </button>
                    </div>
                </div>

                <div class="response-section">
                    <h2 class="response-title">AI의 답변</h2>
                    <div class="response-box" id="response-box">여기에 AI의 공감 답변이 표시됩니다.</div>
                </div>

                <div class="history-section" id="history-section">
                    <h2 class="response-title">나의 일기 히스토리</h2>
                    <div class="history-list" id="history-list"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
